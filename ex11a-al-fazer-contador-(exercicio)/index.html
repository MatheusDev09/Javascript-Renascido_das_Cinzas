<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Temporizador -->
  <div id="timer">0</div>

  <!-- Botões de controle -->
  <button id="startButton">Iniciar</button>
  <button id="pauseButton">Pausar</button>
  <button id="resetButton">Resetar</button>

  <!-- Script JavaScript embutido na página -->
  <script>
    // 1ª Digitação (Resolva aqui o exercício)
    const timer = document.querySelector('#timer');
    const start = document.querySelector('#startButton');
    const pause = document.querySelector('#pauseButton');
    const reset = document.querySelector('#resetButton');
    
    let timeCount = 0;
    let idContador
    
    start.addEventListener('click', () => {
    if (idContador === undefined) { // Quando ele inicia, idContador está undefined, logo, funciona. Enquanto ele não for resetado, não será criado "outro timer"
    idContador = setInterval(() => {
      timeCount++
      timer.innerHTML = timeCount;
    },1000);
  }
});

    pause.addEventListener('click', () => {
      clearInterval(idContador);
      idContador = undefined;
    })

    reset.addEventListener('click', () => {
      clearInterval(idContador);
      idContador = undefined;
      timeCount = 0;
      timer.innerHTML = 0;
      
    })

  </script>
</body>
</html>
